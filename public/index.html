<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Now</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

    :root { --brand: #c8a96e; }

    html, body { height: 100%; }

    body {
      background: #0c0c0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .serif  { font-family: 'Playfair Display', 'Noto Sans SC', serif; }
    .sans   { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
    * { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }

    /* ── Language toggle ── */
    .lang-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50;
      display: flex;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 9999px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 6px 16px;
      font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.35);
      cursor: pointer; transition: all .2s;
      border: none; background: transparent;
    }
    .lang-btn.active {
      background: var(--brand);
      color: #0c0c0c;
    }

    /* ── Gold divider ── */
    .gold-line {
      width: 2.5rem; height: 1px;
      background: var(--brand);
      margin: 0 auto;
      opacity: .7;
    }

    /* ── Order button ── */
    .order-btn {
      width: 4.5rem; height: 4.5rem;
      border-radius: 9999px;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 0 0 8px rgba(200,169,110,.08), 0 0 0 16px rgba(200,169,110,.04);
      cursor: pointer;
    }
    .order-btn:active  { transform: scale(.94); opacity: .85; }

    /* ── Subtle pulse ── */
    .ripple {
      position: absolute;
      width: 4.5rem; height: 4.5rem;
      border-radius: 9999px;
      border: 1px solid rgba(200,169,110,.3);
      animation: ripple 2.4s ease-out infinite;
    }
    .ripple:nth-child(2) { animation-delay: .8s; }
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(2.4); opacity: 0;  }
    }

    /* ── Online dot ── */
    .online-dot {
      width: .55rem; height: .55rem;
      background: #4ade80;
      border-radius: 9999px;
      box-shadow: 0 0 6px #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── Shimmer ── */
    .shimmer {
      display: inline-block;
      background: linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: .3rem; color: transparent !important;
      min-width: 7rem; min-height: .9em;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

  <!-- Language toggle -->
  <div class="lang-toggle sans">
    <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="w-full max-w-xs mx-auto px-6 text-center">

    <!-- Restaurant name -->
    <h1 id="brandName" class="serif text-3xl font-semibold text-white tracking-wide shimmer">&nbsp;</h1>

    <div class="gold-line mt-3 mb-3"></div>

    <p id="brandDesc" class="sans text-xs tracking-widest uppercase shimmer"
       style="color:rgba(255,255,255,.35)">&nbsp;</p>

    <!-- Spacer -->
    <div class="mt-10"></div>

    <!-- AI status row -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="online-dot"></div>
      <span id="aiStatus" class="sans text-xs tracking-wider uppercase"
            style="color:rgba(255,255,255,.4)"></span>
    </div>

    <!-- Order button -->
    <div class="relative flex items-center justify-center mb-8">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <a id="orderLink" href="#" class="order-btn relative z-10" aria-label="Order Now">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none"
             stroke="#0c0c0c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
        </svg>
      </a>
    </div>

    <!-- CTA text -->
    <p id="callHint" class="sans text-sm font-medium mb-1" style="color:var(--brand)"></p>
    <p id="callSubhint" class="sans text-xs" style="color:rgba(255,255,255,.25)"></p>

    <!-- Hours -->
    <div class="mt-10 flex items-center justify-center gap-2" style="color:rgba(255,255,255,.25)">
      <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span id="businessHours" class="sans text-xs tracking-wide shimmer">&nbsp;</span>
    </div>

    <!-- Footer -->
    <p id="footer" class="sans text-xs mt-8" style="color:rgba(255,255,255,.12)"></p>

  </div>

  <script>
    const I18N = {
      zh: {
        aiStatus:    "AI 员工在线",
        callHint:    "点击开始语音点餐",
        callSubhint: "接通后请告知您想点的菜品",
        footer:      "扫码即代表您同意本店服务条款",
      },
      en: {
        aiStatus:    "AI Assistant Online",
        callHint:    "Tap to place your order",
        callSubhint: "Tell the AI what you'd like",
        footer:      "Scanning implies acceptance of our Terms of Service",
      },
    };

    let cfg = {};
    let currentLang = localStorage.getItem("lang") ||
      ((navigator.language || "zh").toLowerCase().startsWith("zh") ? "zh" : "en");

    function render() {
      const t         = I18N[currentLang];
      const brandName = currentLang === "zh" ? cfg.brandName     : cfg.brandNameEn;
      const brandDesc = currentLang === "zh" ? cfg.brandDesc     : cfg.brandDescEn;
      const hours     = currentLang === "zh" ? cfg.businessHours : cfg.businessHoursEn;
      const rawPhone  = (cfg.phone || "").replace(/[\s\-(). ]/g, "");

      document.getElementById("htmlRoot").lang             = currentLang === "zh" ? "zh-CN" : "en";
      document.getElementById("brandName").textContent     = brandName || "";
      document.getElementById("brandDesc").textContent     = brandDesc || "";
      document.getElementById("businessHours").textContent = hours     || "";
      document.getElementById("aiStatus").textContent      = t.aiStatus;
      document.getElementById("callHint").textContent      = t.callHint;
      document.getElementById("callSubhint").textContent   = t.callSubhint;
      document.getElementById("footer").textContent        = t.footer;
      document.getElementById("orderLink").href            = "tel:" + rawPhone;

      document.documentElement.style.setProperty("--brand", cfg.brandColor || "#c8a96e");

      ["brandName", "brandDesc", "businessHours"].forEach(id =>
        document.getElementById(id).classList.remove("shimmer")
      );

      document.getElementById("btnZh").classList.toggle("active", currentLang === "zh");
      document.getElementById("btnEn").classList.toggle("active", currentLang === "en");
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      render();
    }

    fetch("/api/config")
      .then(r => r.json())
      .then(data => { cfg = data; render(); })
      .catch(() => {
        document.getElementById("brandName").textContent = "Unable to load";
      });
  </script>
</body>
</html>
