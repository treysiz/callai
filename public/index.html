<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Now</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      margin: 0; padding: 0;
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* ─── Page wrapper ─── */
    .page {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #111;
      overflow: hidden;
    }

    /* ─── Hero ─── */
    .hero {
      position: relative;
      height: 260px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a0000 0%, #3d0c00 40%, #7a2400 100%);
    }
    /* Radial glow */
    .hero-glow {
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,120,30,.35) 0%, transparent 70%);
      top: -60px; right: -60px;
    }
    /* Grid pattern */
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* Bottom fade */
    .hero-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent, #111);
    }

    /* ─── Lang toggle ─── */
    .lang-toggle {
      position: absolute; top: 16px; right: 16px; z-index: 10;
      display: flex;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 99px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      padding: 4px 13px; border-radius: 99px;
      font-size: .68rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      color: rgba(255,255,255,.4);
      cursor: pointer; border: none; background: transparent;
      transition: all .18s;
    }
    .lang-btn.active {
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.9);
    }

    /* ─── Badge ─── */
    .open-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 99px; padding: 4px 10px;
    }
    .open-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,.8);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ─── Content ─── */
    .content {
      flex: 1;
      padding: 0 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Section card ─── */
    .s-card {
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 18px;
      overflow: hidden;
    }

    /* ─── Category row ─── */
    .cat-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      cursor: pointer;
      transition: background .15s;
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-item:active { background: rgba(255,255,255,.04); }
    .cat-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .cat-arrow {
      margin-left: auto;
      color: rgba(255,255,255,.2);
    }

    /* ─── Order button ─── */
    .order-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, #e85d04, #dc2f02);
      border-radius: 18px; padding: 18px 20px;
      text-decoration: none; cursor: pointer;
      box-shadow: 0 8px 32px rgba(220,47,2,.4);
      transition: transform .13s, box-shadow .13s;
      position: relative; overflow: hidden;
    }
    .order-btn::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
    }
    .order-btn:active {
      transform: scale(.98);
      box-shadow: 0 4px 16px rgba(220,47,2,.35);
    }
    .order-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ─── Hours card ─── */
    .hours-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
    }

    /* ─── Shimmer ─── */
    .shimmer {
      display: inline-block;
      background: linear-gradient(90deg,#222 25%,#2e2e2e 50%,#222 75%);
      background-size: 200% 100%;
      animation: sh 1.4s infinite;
      border-radius: .3rem;
      color: transparent !important;
      min-width: 6rem; min-height: .85em;
    }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div class="page">

  <!-- ─── HERO ─── -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-glow"></div>
    <div class="hero-grid"></div>
    <div class="hero-fade"></div>

    <!-- Lang -->
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
    </div>

    <!-- Hero content -->
    <div style="position:absolute;bottom:28px;left:20px;right:20px;">
      <div class="open-badge mb-3">
        <div class="open-dot"></div>
        <span id="openLabel" style="font-size:.7rem;font-weight:600;color:#4ade80;letter-spacing:.05em;text-transform:uppercase"></span>
      </div>
      <h1 id="brandName"
          style="font-size:1.75rem;font-weight:800;color:#fff;line-height:1.15;letter-spacing:-.02em"
          class="shimmer">&nbsp;</h1>
      <p id="brandDesc"
         style="font-size:.8rem;color:rgba(255,255,255,.4);margin-top:6px;line-height:1.5"
         class="shimmer">&nbsp;</p>
    </div>
  </div>

  <!-- ─── CONTENT ─── -->
  <div class="content">

    <!-- Order button -->
    <a id="orderLink" href="#" class="order-btn">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span id="callHint"    style="font-size:1rem;font-weight:700;color:#fff;line-height:1.2"></span>
        <span id="callSubhint" style="font-size:.75rem;color:rgba(255,255,255,.55)"></span>
      </div>
      <div class="order-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
        </svg>
      </div>
    </a>

    <!-- AI status -->
    <div class="s-card">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
            </svg>
          </div>
          <div>
            <p id="aiLabel" style="font-size:.85rem;font-weight:600;color:rgba(255,255,255,.9)"></p>
            <p id="aiSub"   style="font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px"></p>
          </div>
        </div>
        <span id="aiOnline"
              style="font-size:.68rem;font-weight:600;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2);color:#4ade80;padding:4px 10px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase"></span>
      </div>
    </div>

    <!-- Menu categories -->
    <div>
      <p id="menuTitle" style="font-size:.68rem;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-left:4px;"></p>
      <div class="s-card">
        <div class="cat-item">
          <div class="cat-icon" style="background:rgba(255,100,50,.12);">🍜</div>
          <span id="cat1" style="font-size:.88rem;font-weight:500;color:rgba(255,255,255,.8)"></span>
          <svg class="cat-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="cat-item">
          <div class="cat-icon" style="background:rgba(255,180,50,.12);">🥡</div>
          <span id="cat2" style="font-size:.88rem;font-weight:500;color:rgba(255,255,255,.8)"></span>
          <svg class="cat-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="cat-item">
          <div class="cat-icon" style="background:rgba(100,200,100,.12);">🍱</div>
          <span id="cat3" style="font-size:.88rem;font-weight:500;color:rgba(255,255,255,.8)"></span>
          <svg class="cat-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
        <div class="cat-item">
          <div class="cat-icon" style="background:rgba(100,150,255,.12);">🧋</div>
          <span id="cat4" style="font-size:.88rem;font-weight:500;color:rgba(255,255,255,.8)"></span>
          <svg class="cat-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>
      </div>
    </div>

    <!-- Hours -->
    <div class="s-card">
      <div class="hours-row">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,.3)" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span id="businessHours" style="font-size:.82rem;color:rgba(255,255,255,.45)" class="shimmer">&nbsp;</span>
        </div>
        <span id="openBadge2" style="font-size:.68rem;font-weight:600;color:#4ade80"></span>
      </div>
    </div>

    <!-- Footer -->
    <p id="footer" style="text-align:center;font-size:.68rem;color:rgba(255,255,255,.12);padding:0 8px;line-height:1.6"></p>

  </div>
</div>

  <script>
    const I18N = {
      zh: {
        openLabel:   "现在营业",
        cat1: "主食 / 面条", cat2: "外卖 / 小炒", cat3: "套餐 / 饭盒", cat4: "饮品 / 甜点",
        aiLabel:"AI 点餐助手", aiSub:"语音点餐 · 全程中文", aiOnline:"在线",
        menuTitle: "菜单分类",
        callHint:"一键呼叫 AI 点餐", callSubhint:"接通后告知想点的菜品",
        openBadge2: "营业中",
        footer:"扫码即代表您同意本店服务条款",
      },
      en: {
        openLabel:   "Now Open",
        cat1:"Noodles & Rice", cat2:"Takeout & Stir Fry", cat3:"Combo Meals", cat4:"Drinks & Dessert",
        aiLabel:"AI Order Assistant", aiSub:"Voice ordering · English supported", aiOnline:"Online",
        menuTitle: "Menu",
        callHint:"Call to Order Now", callSubhint:"Tell the AI what you'd like",
        openBadge2: "Open Now",
        footer:"Scanning implies acceptance of our Terms of Service",
      },
    };

    let cfg = {};
    let currentLang = localStorage.getItem("lang") ||
      ((navigator.language||"zh").toLowerCase().startsWith("zh") ? "zh" : "en");

    const TEXT_IDS = ["openLabel","cat1","cat2","cat3","cat4","aiLabel","aiSub",
                      "aiOnline","menuTitle","callHint","callSubhint","openBadge2","footer"];

    function render() {
      const t        = I18N[currentLang];
      const name     = currentLang === "zh" ? cfg.brandName     : cfg.brandNameEn;
      const desc     = currentLang === "zh" ? cfg.brandDesc     : cfg.brandDescEn;
      const hours    = currentLang === "zh" ? cfg.businessHours : cfg.businessHoursEn;
      const rawPhone = (cfg.phone||"").replace(/[\s\-(). ]/g,"");

      document.getElementById("htmlRoot").lang = currentLang === "zh" ? "zh-CN" : "en";
      document.getElementById("brandName").textContent     = name  || "";
      document.getElementById("brandDesc").textContent     = desc  || "";
      document.getElementById("businessHours").textContent = hours || "";
      document.getElementById("orderLink").href            = "tel:" + rawPhone;

      TEXT_IDS.forEach(id => {
        document.getElementById(id).textContent = t[id];
      });

      ["brandName","brandDesc","businessHours"].forEach(id =>
        document.getElementById(id).classList.remove("shimmer")
      );

      document.getElementById("btnZh").classList.toggle("active", currentLang==="zh");
      document.getElementById("btnEn").classList.toggle("active", currentLang==="en");
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      render();
    }

    fetch("/api/config")
      .then(r => r.json())
      .then(data => { cfg = data; render(); })
      .catch(() => { document.getElementById("brandName").textContent = "Unable to load"; });
  </script>
</body>
</html>
