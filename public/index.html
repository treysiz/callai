<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线点餐 / Order Now</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap');

    :root { --brand: #b91c1c; --gold: #d97706; }

    * { font-family: 'Inter','Noto Sans SC',system-ui,sans-serif; }

    body {
      background: linear-gradient(160deg,#1a0a00 0%,#2d0f00 45%,#1a0a00 100%);
      min-height: 100vh;
    }

    /* ── Language toggle ── */
    .lang-toggle {
      position:fixed; top:1rem; right:1rem; z-index:50;
      display:flex;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.14);
      border-radius:9999px; padding:3px; gap:2px;
    }
    .lang-btn {
      padding:5px 14px; border-radius:9999px;
      font-size:.75rem; font-weight:600; letter-spacing:.04em;
      color:rgba(255,255,255,.5); cursor:pointer;
      transition:all .2s; border:none; background:transparent;
    }
    .lang-btn.active { background:var(--brand); color:#fff; box-shadow:0 2px 8px rgba(185,28,28,.5); }
    .lang-btn:not(.active):hover { color:rgba(255,255,255,.85); }

    /* ── Decorative lantern dots ── */
    .lantern { animation: sway 3s ease-in-out infinite; transform-origin: top center; }
    @keyframes sway {
      0%,100%{ transform:rotate(-4deg); }
      50%    { transform:rotate( 4deg); }
    }
    .lantern:nth-child(2){ animation-delay:.5s; }
    .lantern:nth-child(3){ animation-delay:1s;  }

    /* ── Card ── */
    .card {
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,200,100,.15);
    }

    /* ── Feature chips ── */
    .chip {
      background:rgba(255,200,100,.08);
      border:1px solid rgba(255,200,100,.2);
      border-radius:.75rem;
      padding:.45rem .85rem;
      display:flex; align-items:center; gap:.4rem;
      color:rgba(255,220,150,.9);
      font-size:.78rem; font-weight:500;
    }

    /* ── Order button ── */
    .order-btn {
      background: linear-gradient(135deg,#dc2626,#991b1b);
      box-shadow: 0 0 40px rgba(220,38,38,.35), inset 0 1px 0 rgba(255,255,255,.15);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .order-btn:active { transform:scale(.97); }
    .order-btn:hover  { box-shadow:0 0 55px rgba(220,38,38,.5), inset 0 1px 0 rgba(255,255,255,.15); }

    /* ── Gold ring pulse ── */
    .pulse-gold { animation:pulse-gold 2.2s ease-out infinite; }
    @keyframes pulse-gold {
      0%  { transform:scale(1);   opacity:.5; }
      80% { transform:scale(1.55);opacity:0;  }
      100%{ transform:scale(1.55);opacity:0;  }
    }

    /* ── Divider ── */
    .divider {
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,200,100,.25),transparent);
    }

    /* ── Shimmer ── */
    .shimmer {
      display:inline-block;
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
      border-radius:.4rem; color:transparent !important; min-width:8rem; min-height:1em;
    }
    @keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-5 py-10">

  <!-- Language toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="w-full max-w-sm mx-auto">

    <!-- ── Header ── -->
    <div class="text-center mb-6">

      <!-- Lanterns decoration -->
      <div class="flex justify-center gap-5 mb-4">
        <div class="lantern w-3 h-5 rounded-full" style="background:radial-gradient(circle at 40% 35%,#fbbf24,#dc2626)"></div>
        <div class="lantern w-3 h-5 rounded-full" style="background:radial-gradient(circle at 40% 35%,#fbbf24,#dc2626)"></div>
        <div class="lantern w-3 h-5 rounded-full" style="background:radial-gradient(circle at 40% 35%,#fbbf24,#dc2626)"></div>
      </div>

      <!-- Logo -->
      <div id="brandLogo" class="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-4 shadow-lg"
           style="background:linear-gradient(135deg,#dc2626,#991b1b)">
        <!-- bowl + chopsticks icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-yellow-300" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3C8 3 4.5 5.5 4.5 9c0 3 2 5.5 4.5 6.5V18h6v-2.5C17.5 14.5 19.5 12 19.5 9c0-3.5-3.5-6-7.5-6z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 18v2m6-2v2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9h18"/>
        </svg>
      </div>

      <h1 id="brandName" class="text-2xl font-black text-white tracking-wide shimmer">&nbsp;</h1>
      <p  id="brandDesc" class="text-yellow-400/80 text-sm mt-1 shimmer">&nbsp;</p>
    </div>

    <!-- ── Feature chips ── -->
    <div class="flex flex-wrap justify-center gap-2 mb-6">
      <div class="chip">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15a2.25 2.25 0 01-2.025 2.245m-15.15 0A2.25 2.25 0 014.8 15m15 0v-2.655A1.875 1.875 0 0018.075 10.5H5.925A1.875 1.875 0 004.2 12.345V15m15 0H4.8"/></svg>
        <span id="chip1"></span>
      </div>
      <div class="chip">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
        <span id="chip2"></span>
      </div>
      <div class="chip">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
        <span id="chip3"></span>
      </div>
    </div>

    <!-- ── Main card ── -->
    <div class="card rounded-3xl p-7 mb-5">

      <!-- AI employee intro -->
      <div class="flex items-center gap-4 mb-5">
        <div class="relative flex-shrink-0">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center"
               style="background:linear-gradient(135deg,#f59e0b,#d97706)">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
            </svg>
          </div>
          <!-- Online dot -->
          <span class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-green-400 border-2 border-[#1a0a00] rounded-full"></span>
        </div>
        <div class="text-left">
          <p id="aiName"   class="text-white font-bold text-base leading-tight"></p>
          <p id="aiStatus" class="text-green-400 text-xs font-medium mt-0.5"></p>
          <p id="aiDesc"   class="text-white/50 text-xs mt-0.5"></p>
        </div>
      </div>

      <div class="divider mb-5"></div>

      <!-- Order button -->
      <div class="relative flex items-center justify-center my-6">
        <div class="absolute w-28 h-28 rounded-full bg-yellow-500 opacity-10 pulse-gold"></div>
        <div class="absolute w-28 h-28 rounded-full bg-yellow-500 opacity-10 pulse-gold" style="animation-delay:.6s"></div>

        <a id="orderLink" href="#"
           class="order-btn relative z-10 w-24 h-24 rounded-full flex flex-col items-center justify-center gap-1 cursor-pointer">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
          </svg>
          <span id="btnLabel" class="text-white text-xs font-bold"></span>
        </a>
      </div>

      <p id="callHint"    class="text-yellow-400 font-semibold text-base text-center"></p>
      <p id="callSubhint" class="text-white/40 text-xs text-center mt-1"></p>
    </div>

    <!-- ── Hours ── -->
    <div class="card rounded-2xl px-5 py-3.5">
      <div class="flex items-center justify-center gap-2 text-white/60 text-sm">
        <svg class="w-4 h-4 text-yellow-500/70 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="businessHours" class="shimmer">&nbsp;</span>
      </div>
    </div>

    <p id="footer" class="text-white/20 text-xs text-center mt-5"></p>
  </div>

  <script>
    const I18N = {
      zh: {
        chip1:       "中式料理",
        chip2:       "AI 智能点餐",
        chip3:       "极速响应",
        aiName:      "AI 点餐助手",
        aiStatus:    "在线服务中",
        aiDesc:      "语音点餐 · 全程中文",
        btnLabel:    "开始点餐",
        callHint:    "点击与 AI 员工语音点餐",
        callSubhint: "接通后请说出您想点的菜品",
        footer:      "扫码即代表您同意本店服务条款",
      },
      en: {
        chip1:       "Chinese Cuisine",
        chip2:       "AI Ordering",
        chip3:       "Instant Service",
        aiName:      "AI Order Assistant",
        aiStatus:    "Online & Ready",
        aiDesc:      "Voice ordering · English supported",
        btnLabel:    "Order Now",
        callHint:    "Tap to order with our AI assistant",
        callSubhint: "Tell the AI what you'd like to order",
        footer:      "Scanning implies acceptance of our Terms of Service",
      },
    };

    let cfg = {};
    let currentLang = localStorage.getItem("lang") ||
      ((navigator.language||"zh").toLowerCase().startsWith("zh") ? "zh" : "en");

    function render() {
      const t = I18N[currentLang];
      const brandName = currentLang === "zh" ? cfg.brandName     : cfg.brandNameEn;
      const brandDesc = currentLang === "zh" ? cfg.brandDesc     : cfg.brandDescEn;
      const hours     = currentLang === "zh" ? cfg.businessHours : cfg.businessHoursEn;
      const rawPhone  = (cfg.phone||"").replace(/[\s\-(). ]/g,"");

      document.getElementById("htmlRoot").lang             = currentLang === "zh" ? "zh-CN" : "en";
      document.getElementById("brandName").textContent     = brandName || "";
      document.getElementById("brandDesc").textContent     = brandDesc || "";
      document.getElementById("businessHours").textContent = hours || "";
      document.getElementById("orderLink").href            = "tel:" + rawPhone;
      document.getElementById("brandLogo").style.background =
        `linear-gradient(135deg,${cfg.brandColor||"#dc2626"},${cfg.brandColor||"#991b1b"})`;

      ["chip1","chip2","chip3","aiName","aiStatus","aiDesc",
       "btnLabel","callHint","callSubhint","footer"].forEach(id => {
        document.getElementById(id).textContent = t[id];
      });

      ["brandName","brandDesc","businessHours"].forEach(id => {
        document.getElementById(id).classList.remove("shimmer");
      });

      document.getElementById("btnZh").classList.toggle("active", currentLang === "zh");
      document.getElementById("btnEn").classList.toggle("active", currentLang === "en");
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      render();
    }

    fetch("/api/config")
      .then(r => r.json())
      .then(data => { cfg = data; render(); })
      .catch(() => { document.getElementById("brandName").textContent = "加载失败，请刷新"; });
  </script>
</body>
</html>
