<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>联系我们 / Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    * { font-family: 'Inter','Noto Sans SC',system-ui,sans-serif; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; margin:0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);
    }

    /* lang toggle */
    .lang-toggle {
      position:fixed; top:1rem; right:1rem; z-index:50;
      display:flex;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.14);
      border-radius:9999px; padding:3px; gap:2px;
    }
    .lang-btn {
      padding:5px 15px; border-radius:9999px;
      font-size:.72rem; font-weight:600; letter-spacing:.03em;
      color:rgba(255,255,255,.45);
      cursor:pointer; border:none; background:transparent;
      transition:all .18s;
    }
    .lang-btn.active { background:rgba(255,255,255,.18); color:#fff; }

    /* glass card */
    .glass {
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.12);
    }

    /* pulse ring */
    .pulse { animation:pulse 2s ease-out infinite; }
    .pulse2{ animation:pulse 2s ease-out .5s infinite; }
    @keyframes pulse {
      0%  { transform:scale(1);   opacity:.5; }
      80% { transform:scale(1.65);opacity:0;  }
      100%{ transform:scale(1.65);opacity:0;  }
    }

    /* call button */
    .call-btn { transition:transform .14s,box-shadow .14s; }
    .call-btn:active { transform:scale(.94); }

    /* shimmer */
    .shimmer {
      display:inline-block;
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%;
      animation:sh 1.4s infinite;
      border-radius:.3rem; color:transparent !important;
      min-width:7rem; min-height:.9em;
    }
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>

  <div class="lang-toggle">
    <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="w-full max-w-sm mx-auto px-5 text-center">

    <!-- Logo + brand -->
    <div class="mb-8">
      <div id="brandLogo"
           class="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-4 shadow-xl"
           style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">
        <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
        </svg>
      </div>
      <h1 id="brandName" class="text-2xl font-bold text-white shimmer">&nbsp;</h1>
      <p  id="brandDesc" class="text-blue-300 text-sm mt-1 shimmer">&nbsp;</p>
    </div>

    <!-- Main card -->
    <div class="glass rounded-3xl p-8 mb-5">

      <!-- Phone label + number -->
      <p id="labelPhone" class="text-gray-400 text-xs uppercase tracking-widest mb-2"></p>
      <p id="phoneDisplay" class="text-3xl font-bold text-white tracking-wide mb-6 shimmer">&nbsp;</p>

      <!-- Pulse + call button -->
      <div class="relative flex items-center justify-center my-6">
        <div class="absolute w-24 h-24 rounded-full bg-green-500 opacity-20 pulse"></div>
        <div class="absolute w-24 h-24 rounded-full bg-green-500 opacity-20 pulse2"></div>
        <a id="callLink" href="#"
           class="call-btn relative z-10 w-20 h-20 rounded-full flex items-center justify-center shadow-xl cursor-pointer"
           style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 30px rgba(34,197,94,.4)">
          <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
          </svg>
        </a>
      </div>

      <p id="callHint"    class="text-green-400 font-semibold text-base"></p>
      <p id="callSubhint" class="text-gray-500 text-xs mt-1"></p>
    </div>

    <!-- Hours pill -->
    <div class="glass rounded-2xl px-6 py-3.5">
      <div class="flex items-center justify-center gap-2 text-gray-300 text-sm">
        <svg class="w-4 h-4 text-blue-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="businessHours" class="shimmer">&nbsp;</span>
      </div>
    </div>

    <p id="footer" class="text-gray-600 text-xs mt-5"></p>
  </div>

  <script>
    const I18N = {
      zh: {
        labelPhone:  "客服电话",
        callHint:    "点击按钮立即拨打",
        callSubhint: "将为您直接接通人工客服",
        footer:      "扫码即代表您同意我们的服务条款",
      },
      en: {
        labelPhone:  "Customer Hotline",
        callHint:    "Tap the button to call now",
        callSubhint: "You will be connected to our AI agent",
        footer:      "Scanning implies acceptance of our Terms of Service",
      },
    };

    let cfg = {};
    let currentLang = localStorage.getItem("lang") ||
      ((navigator.language||"zh").toLowerCase().startsWith("zh") ? "zh" : "en");

    function render() {
      const t        = I18N[currentLang];
      const name     = currentLang === "zh" ? cfg.brandName     : cfg.brandNameEn;
      const desc     = currentLang === "zh" ? cfg.brandDesc     : cfg.brandDescEn;
      const hours    = currentLang === "zh" ? cfg.businessHours : cfg.businessHoursEn;
      const rawPhone = (cfg.phone||"").replace(/[\s\-(). ]/g,"");
      const color    = cfg.brandColor || "#1d4ed8";

      document.getElementById("htmlRoot").lang             = currentLang === "zh" ? "zh-CN" : "en";
      document.getElementById("brandName").textContent     = name  || "";
      document.getElementById("brandDesc").textContent     = desc  || "";
      document.getElementById("phoneDisplay").textContent  = cfg.phone || "";
      document.getElementById("businessHours").textContent = hours || "";
      document.getElementById("callLink").href             = "tel:" + rawPhone;
      document.getElementById("labelPhone").textContent    = t.labelPhone;
      document.getElementById("callHint").textContent      = t.callHint;
      document.getElementById("callSubhint").textContent   = t.callSubhint;
      document.getElementById("footer").textContent        = t.footer;
      document.getElementById("brandLogo").style.background =
        `linear-gradient(135deg,${color}dd,${color})`;

      ["brandName","brandDesc","phoneDisplay","businessHours"].forEach(id =>
        document.getElementById(id).classList.remove("shimmer")
      );

      document.getElementById("btnZh").classList.toggle("active", currentLang==="zh");
      document.getElementById("btnEn").classList.toggle("active", currentLang==="en");
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      render();
    }

    fetch("/api/config")
      .then(r => r.json())
      .then(data => { cfg = data; render(); })
      .catch(() => { document.getElementById("phoneDisplay").textContent = "Unable to load"; });
  </script>
</body>
</html>
