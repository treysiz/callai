<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们 / Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    :root { --brand: #1d4ed8; }

    * { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      min-height: 100vh;
    }

    /* ── Language toggle ── */
    .lang-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 9999px;
      padding: 3px;
      gap: 2px;
      z-index: 50;
    }
    .lang-btn {
      padding: 5px 14px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
    }
    .lang-btn.active {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 2px 8px rgba(29,78,216,0.5);
    }
    .lang-btn:not(.active):hover { color: rgba(255,255,255,0.85); }

    /* ── Pulse ── */
    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.6; }
      80%  { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .call-btn { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .call-btn:active { transform: scale(0.95); }

    .glass {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Fade transition ── */
    .fade { transition: opacity 0.2s ease; }
    .fade.hidden-lang { opacity: 0; pointer-events: none; position: absolute; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

  <!-- Language Toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="btnEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="w-full max-w-sm mx-auto text-center">

    <!-- Logo / Brand -->
    <div class="mb-8">
      <div id="brandLogo" class="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-4"
           style="background: linear-gradient(135deg,#3b82f6,#1d4ed8);">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
        </svg>
      </div>
      <h1 id="brandName" class="text-2xl font-bold text-white"></h1>
      <p  id="brandDesc" class="text-blue-300 text-sm mt-1"></p>
    </div>

    <!-- Card -->
    <div class="glass rounded-3xl p-8 mb-6">

      <!-- Phone label -->
      <div class="mb-6">
        <p id="labelPhone" class="text-gray-400 text-xs uppercase tracking-widest mb-2"></p>
        <div id="phoneDisplay" class="text-3xl font-bold text-white tracking-wide">—</div>
      </div>

      <!-- Pulse + Call Button -->
      <div class="relative flex items-center justify-center my-8">
        <div class="absolute w-24 h-24 rounded-full bg-green-500 opacity-20 pulse-ring"></div>
        <div class="absolute w-24 h-24 rounded-full bg-green-500 opacity-20 pulse-ring" style="animation-delay:.5s"></div>
        <a id="callLink" href="#"
           class="call-btn relative z-10 w-20 h-20 rounded-full flex items-center justify-center shadow-xl cursor-pointer"
           style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 30px rgba(34,197,94,.4);">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-white" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
          </svg>
        </a>
      </div>

      <p id="callHint"    class="text-green-400 font-semibold text-base"></p>
      <p id="callSubhint" class="text-gray-500 text-xs mt-1"></p>
    </div>

    <!-- Business hours -->
    <div class="glass rounded-2xl px-6 py-4">
      <div class="flex items-center justify-center gap-2 text-gray-300 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-blue-400 flex-shrink-0"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="businessHours"></span>
      </div>
    </div>

    <!-- Footer -->
    <p id="footer" class="text-gray-600 text-xs mt-6"></p>
  </div>

  <script>
    // ====================================================
    //  配置区 — 只需修改这里的内容即可
    // ====================================================
    const CONFIG = {
      phone:      "138-0000-0000",   // ← 绑定的手机号码
      brandColor: "#1d4ed8",         // ← 品牌主色

      zh: {
        brandName:     "联系客服",
        brandDesc:     "专业服务，随时为您解答",
        labelPhone:    "客服电话",
        businessHours: "服务时间：周一至周日 09:00 – 18:00",
        callHint:      "点击按钮立即拨打",
        callSubhint:   "将为您直接接通人工客服",
        footer:        "扫码即代表您同意我们的服务条款",
      },

      en: {
        brandName:     "Contact Support",
        brandDesc:     "Professional service, always here for you",
        labelPhone:    "Customer Hotline",
        businessHours: "Hours: Mon – Sun  09:00 – 18:00",
        callHint:      "Tap the button to call now",
        callSubhint:   "You will be connected to a live agent",
        footer:        "Scanning implies acceptance of our Terms of Service",
      },
    };
    // ====================================================

    const rawPhone = CONFIG.phone.replace(/[\s\-]/g, "");
    document.getElementById("phoneDisplay").textContent = CONFIG.phone;
    document.getElementById("callLink").href = "tel:" + rawPhone;
    document.getElementById("brandLogo").style.background =
      `linear-gradient(135deg, ${CONFIG.brandColor}, ${CONFIG.brandColor}cc)`;

    // Detect browser language on first load
    const saved = localStorage.getItem("lang");
    const auto  = (navigator.language || "zh").toLowerCase().startsWith("zh") ? "zh" : "en";
    let currentLang = saved || auto;

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);

      const t = CONFIG[lang];
      document.getElementById("htmlRoot").lang        = lang === "zh" ? "zh-CN" : "en";
      document.getElementById("brandName").textContent     = t.brandName;
      document.getElementById("brandDesc").textContent     = t.brandDesc;
      document.getElementById("labelPhone").textContent    = t.labelPhone;
      document.getElementById("businessHours").textContent = t.businessHours;
      document.getElementById("callHint").textContent      = t.callHint;
      document.getElementById("callSubhint").textContent   = t.callSubhint;
      document.getElementById("footer").textContent        = t.footer;

      document.getElementById("btnZh").classList.toggle("active", lang === "zh");
      document.getElementById("btnEn").classList.toggle("active", lang === "en");
    }

    // Init
    setLang(currentLang);
  </script>
</body>
</html>
